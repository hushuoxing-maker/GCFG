<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>古月AI · 国潮门头提示词生成器</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:"Microsoft YaHei";
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:30px;
    color:#fff;
}

/* 主卡片 */
.card{
    width:100%;
    max-width:1500px;
    border-radius:30px;
    background:linear-gradient(145deg,rgba(255,255,255,0.08),rgba(255,255,255,0.02));
    backdrop-filter:blur(20px);
    box-shadow:0 20px 80px rgba(0,0,0,0.6);
    overflow:hidden;
    border:1px solid rgba(255,255,255,0.1);
}

/* 头部 */
.header{
    padding:30px;
    background:linear-gradient(90deg,#ff512f,#dd2476);
}

.header h1{
    font-size:34px;
    font-weight:800;
}

.header p{
    opacity:0.9;
    margin-top:8px;
}

/* 主体 */
.main{
    display:flex;
}

/* 左侧输入 */
.left{
    width:380px;
    padding:30px;
    border-right:1px solid rgba(255,255,255,0.1);
}

input{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    margin-bottom:15px;
    background:rgba(255,255,255,0.08);
    color:#fff;
}

input:focus{
    outline:none;
    box-shadow:0 0 0 2px #ff4d4d;
}

/* 按钮 */
button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:12px;
    background:linear-gradient(90deg,#ff512f,#dd2476);
    color:#fff;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:translateY(-3px);
    box-shadow:0 10px 30px rgba(255,80,80,0.5);
}

/* 右侧输出 */
.right{
    flex:1;
    padding:30px;
    max-height:800px;
    overflow:auto;
}

/* 卡片 */
.item{
    background:linear-gradient(135deg,rgba(255,255,255,0.06),rgba(255,255,255,0.02));
    padding:20px;
    border-radius:18px;
    margin-bottom:15px;
    border:1px solid rgba(255,255,255,0.1);
    position:relative;
}

.item:hover{
    transform:translateY(-4px);
    box-shadow:0 10px 40px rgba(0,0,0,0.4);
}

.copy{
    position:absolute;
    right:15px;
    bottom:15px;
    padding:6px 12px;
    border:none;
    border-radius:8px;
    background:#ff512f;
    color:#fff;
    cursor:pointer;
}

</style>
</head>

<body>

<div class="card">
    <div class="header">
        <h1>🔥 古月AI · 国潮门头生成器</h1>
        <p>白天正立面 · 可施工 · 20组完全不同</p>
    </div>

    <div class="main">
        <div class="left">
            <input id="industry" placeholder="行业类型（如：奶茶店）">
            <input id="brand" placeholder="品牌名">
            <input id="category" placeholder="主营品类">
            <input id="slogan" placeholder="标语">

            <button onclick="generate()">生成20组提示词</button>
        </div>

        <div class="right" id="output"></div>
    </div>
</div>

<script>

function generate(){
    const industry=document.getElementById("industry").value||"奶茶店";
    const brand=document.getElementById("brand").value||"东方茶集";
    const category=document.getElementById("category").value||"国潮茶饮";
    const slogan=document.getElementById("slogan").value||"中国味道";

    const styles=[
        "红黑撞色","霓虹国潮","赛博国风","传统纹样融合",
        "龙纹元素","水墨潮流","东方街头风","金色宫廷风",
        "新中式极简","国潮插画风","霓虹灯牌风","国风涂鸦",
        "青花瓷配色","敦煌配色","中国红主题","潮流黑金",
        "东方未来风","国潮赛博朋克","复古国潮","戏曲元素"
    ];

    let html="";

    for(let i=0;i<20;i++){
        let p=`白天自然光，${industry}门头正立面完整展示，正面平视视角，无透视畸变无遮挡。国潮门头设计，${styles[i]}风格，视觉冲击强，年轻网红感。采用烤漆板、软膜灯箱底座、亚克力发光字、不锈钢结构、国潮图案装饰板。品牌店名“${brand}”结合主营“${category}”与标语“${slogan}”，粗体国潮字体设计。日间发光字高亮，氛围灯增强层次。8K高清商业写实效果图，细节丰富，色彩自然，可直接施工。`;

        html+=`
        <div class="item">
            ${p}
            <button class="copy" onclick="copyText(this)">复制</button>
        </div>`;
    }

    document.getElementById("output").innerHTML=html;
}

function copyText(btn){
    const text=btn.parentNode.innerText.replace("复制","");
    navigator.clipboard.writeText(text);
    btn.innerText="已复制";
    setTimeout(()=>btn.innerText="复制",1000);
}

</script>

</body>
</html>
